[project]
name = "syntv-online"
plan = "pro"
region = "auto"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["https://syntv.com/*"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.sessions]
timebox = 2592000  # 30 days

[api]
enabled = true
port = 54321
schemas = ["public", "auth", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
migration_dir = "supabase/migrations"
seed_file = "supabase/seed.sql"

[storage]
enabled = true
file_size_limit = 52428800  # 50MB

[edge_functions]
enabled = true
include = ["stripe-checkout", "stripe-webhook", "process-playlist", "process-epg", "admin-check", "send-notification"]
verify_jwt = true

[analytics]
enabled = true

# Secrets (set these in Supabase Dashboard or via supabase secrets set)
# STRIPE_SECRET_KEY=sk_live_xxx
# STRIPE_WEBHOOK_SECRET=whsec_xxx
# ENCRYPTION_SECRET=your-32-char-secret
